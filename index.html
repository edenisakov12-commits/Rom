<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rom 👶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; color: #334155; overflow-x: hidden; font-size: 110%; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { background: #1a1a1a; border-radius: 50px; margin: 10px 15px; height: 75px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .nav-item { color: #94a3b8; transition: all 0.3s; flex: 1; display: flex; flex-direction: column; items: center; justify-content: center; }
        .nav-item.active { color: #7dd3fc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .sync-badge { font-size: 10px; position: absolute; top: 10px; left: 15px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .check-btn { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid white; transition: all 0.3s; box-shadow: 0 10px 20px rgba(56,189,248,0.3); }
        .repo-item-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .repo-item.open .repo-item-content { max-height: 250px; margin-top: 15px; }
        .chevron { transition: transform 0.3s; }
        .repo-item.open .chevron { transform: rotate(180deg); }
        .idea-row { cursor: pointer; transition: all 0.2s; }
        .idea-row:active { transform: scale(0.97); background-color: #f1f5f9; }
    </style>
</head>
<body class="pb-24">

    <div id="status-badge" class="sync-badge bg-gray-100 text-gray-400">מתחבר...</div>

    <div class="pt-6 pb-2 text-center">
        <h1 class="text-5xl font-light tracking-widest text-gray-800" style="font-family: serif;">Rom</h1>
        <div class="h-1 w-8 bg-sky-200 mx-auto mt-2 rounded-full"></div>
    </div>

    <main class="px-6">
        <section id="sec-home" class="space-y-5">
            <div class="glass-card shadow-xl p-8 text-center border-white relative overflow-hidden">
                <h3 class="text-sky-400 font-bold text-xs uppercase tracking-widest mb-2 italic">מה אוכלים היום?</h3>
                <div id="today-food-text" class="text-5xl font-bold text-gray-800 mb-1 italic italic">טוען...</div>
                <div id="today-day-text" class="text-gray-400 text-sm mb-6 italic">טוען נתונים...</div>
                <div class="flex justify-center">
                    <button onclick="markDayDone()" id="main-check-btn" class="check-btn bg-sky-400 text-white text-3xl active:scale-90"><i class="fas fa-check"></i></button>
                </div>
            </div>
            <div id="week-carousel" class="flex space-x-4 space-x-reverse overflow-x-auto no-scrollbar pb-2 italic"></div>
        </section>

        <section id="sec-ideas" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-center text-gray-800 italic">רעיונות וערכים</h2>
            
            <div class="glass-card p-4 shadow-sm border-sky-100">
                <h4 class="text-sm font-bold text-sky-500 mb-2">מחשבון שילובים אישי</h4>
                <div class="flex gap-2">
                    <input id="custom-mix-input" type="text" placeholder="למשל: עוף וגזר" class="flex-1 bg-white border rounded-xl p-2 text-sm text-right">
                    <button onclick="calculateCustomNutrition()" class="bg-sky-400 text-white px-3 rounded-xl text-sm font-bold">בדוק</button>
                    <button onclick="openAddIdeaModal()" class="bg-green-400 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md"><i class="fas fa-plus"></i></button>
                </div>
                <div id="custom-result" class="mt-2 text-[10px] text-gray-500 hidden bg-sky-50 p-2 rounded-lg text-right"></div>
            </div>

            <div id="ideas-content" class="space-y-4">
                </div>
        </section>

        <section id="sec-repo" class="hidden space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 mr-2 text-right">מאגר שבועות</h2>
            <div id="repo-list" class="space-y-4"></div>
        </section>

        <section id="sec-med" class="hidden space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 mr-2 text-right">פנקס רפואי</h2>
            <div id="med-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="nutri-modal" class="modal" onclick="closeNutriModal()">
        <div class="glass-card w-full max-w-sm p-8 shadow-2xl space-y-4 text-right overflow-y-auto max-h-[80vh]" onclick="event.stopPropagation()">
            <h3 id="nutri-title" class="text-2xl font-bold text-sky-500 border-b pb-2">ניתוח רכיבים</h3>
            <div id="nutri-body" class="text-sm space-y-4 text-gray-600"></div>
            <button onclick="closeNutriModal()" class="w-full bg-sky-400 text-white p-3 rounded-2xl font-bold">סגור</button>
        </div>
    </div>

    <div id="add-idea-modal" class="modal">
        <div class="glass-card w-full max-w-sm p-8 shadow-2xl space-y-4 text-right">
            <h3 class="text-2xl font-bold text-gray-800">שמירת שילוב 🥗</h3>
            <input id="new-idea-name" type="text" placeholder="שם המנה" class="w-full border rounded-2xl p-3 text-right">
            <p id="new-idea-items" class="text-xs text-sky-400 font-bold"></p>
            <div class="flex gap-2">
                <button onclick="saveNewIdea()" class="flex-1 bg-green-400 text-white p-3 rounded-2xl font-bold">שמור</button>
                <button onclick="toggleModal('add-idea-modal', false)" class="flex-1 bg-gray-100 text-gray-500 p-3 rounded-2xl font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center z-50">
        <div class="bottom-nav flex items-center w-full max-w-sm">
            <button onclick="nav('repo')" id="nav-repo" class="nav-item flex flex-col"><i class="fas fa-archive text-lg"></i><span class="text-[8px] mt-1 font-bold">מאגר</span></button>
            <button onclick="nav('ideas')" id="nav-ideas" class="nav-item flex flex-col"><i class="fas fa-lightbulb text-lg"></i><span class="text-[8px] mt-1 font-bold">רעיונות</span></button>
            <button onclick="nav('home')" id="nav-home" class="active flex-shrink-0 -mt-8 mx-2"><div class="w-16 h-16 bg-sky-400 rounded-full flex items-center justify-center border-4 border-[#1a1a1a] shadow-xl text-white"><i class="fas fa-heart text-xl"></i></div></button>
            <button onclick="nav('med')" id="nav-med" class="nav-item flex flex-col"><i class="fas fa-notes-medical text-lg"></i><span class="text-[8px] mt-1 font-bold">רפואי</span></button>
            <button onclick="toggleModal('baby-modal', true)" id="nav-baby" class="nav-item flex flex-col"><i class="fas fa-baby text-lg"></i><span class="text-[8px] mt-1 font-bold">רום</span></button>
        </div>
    </nav>

    <script>
        const k1 = "AIzaSyCNJE1_9GV", k2 = "z9P7W8wuDo5IZEGqbLv5cvzI";
        const firebaseConfig = { apiKey: k1 + k2, authDomain: "romtastings.firebaseapp.com", databaseURL: "https://romtastings-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "romtastings" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let tastings = [], medical = [], babyDOB = "2024-08-01", activeWeek = 1, activeIdx = 0, customIdeas = [];

        const nutriDB = {
            "בטטה": { info: "ויטמין A לראייה וחיזוק המערכת החיסונית.", vit: ["A", "C"], mineral: "אשלגן" },
            "גזר": { info: "בטא-קרוטן החיוני לבריאות העור והעיניים.", vit: ["A", "K"], mineral: "סיבים" },
            "קישוא": { info: "קל לעיכול ומרגיע את מערכת העיכול.", vit: ["C", "B6"], mineral: "מגנזיום" },
            "הודו": { info: "עשיר בברזל ו-B12, קריטי לגדילה.", vit: ["B12", "B6"], mineral: "ברזל" },
            "עוף": { info: "חלבון נקי וקל לספיגה.", vit: ["B3", "B6"], mineral: "חלבון" },
            "עדשים": { info: "ברזל מהצומח וחלבון איכותי.", vit: ["B9"], mineral: "ברזל, סיבים" },
            "ברוקולי": { info: "סידן וויטמין K לבניית העצמות.", vit: ["C", "K"], mineral: "סידן" },
            "אבוקדו": { info: "שומן בריא להתפתחות המוח.", vit: ["E", "K"], mineral: "אומגה 9" },
            "תפוח": { info: "ויטמינים וסיבים לעיכול טוב.", vit: ["C"], mineral: "סיבים" },
            "בננה": { info: "אנרגיה זמינה ואשלגן לשרירים.", vit: ["B6"], mineral: "אשלגן" },
            "דלעת": { info: "עשירה בנוגדי חמצון וויטמין A.", vit: ["A", "C"], mineral: "אשלגן" }
        };

        const baseIdeas = [
            { id: 1, title: "המרק הכתום הקלאסי", ingredients: ["בטטה", "גזר", "עדשים"], desc: "פצצת ויטמינים לחיזוק החיסון" },
            { id: 2, title: "השילוב הירוק", ingredients: ["קישוא", "ברוקולי"], desc: "עשיר בסיבים וברזל קליל" },
            { id: 3, title: "מנת הברזל הראשונה", ingredients: ["הודו", "גזר", "בטטה"], desc: "חשוב במיוחד מגיל 6 חודשים" },
            { id: 4, title: "ארוחת בוקר רכה", ingredients: ["אבוקדו", "בננה"], desc: "שומן בריא ואנרגיה זמינה" }
        ];

        // פונקציה לפתיחת הפופ-אפ (חשוב שתהיה גלובלית)
        window.showNutri = function(title, ingredients) {
            const modal = document.getElementById('nutri-modal');
            const titleEl = document.getElementById('nutri-title');
            const bodyEl = document.getElementById('nutri-body');
            
            titleEl.innerText = title;
            let html = "";
            
            ingredients.forEach(ing => {
                const data = nutriDB[ing.trim()];
                if(data) {
                    html += `
                    <div class="bg-gray-50 p-4 rounded-2xl border-r-4 border-sky-400 mb-2">
                        <div class="font-bold text-gray-800">${ing}</div>
                        <p class="text-xs text-gray-600 mb-2">${data.info}</p>
                        <div class="flex flex-wrap gap-1">
                            ${data.vit.map(v => `<span class="bg-amber-50 text-amber-600 text-[10px] px-2 py-0.5 rounded-full">ויטמין ${v}</span>`).join('')}
                            <span class="bg-sky-50 text-sky-600 text-[10px] px-2 py-0.5 rounded-full">${data.mineral}</span>
                        </div>
                    </div>`;
                } else {
                    html += `<div class="p-4 bg-gray-50 rounded-2xl border-r-4 border-gray-200 mb-2"><b>${ing}</b><br><span class="text-xs">רכיב תזונתי חשוב להתפתחות.</span></div>`;
                }
            });
            
            bodyEl.innerHTML = html;
            modal.classList.add('active');
        };

        window.closeNutriModal = function() {
            document.getElementById('nutri-modal').classList.remove('active');
        };

        function updateIdeas() {
            const container = document.getElementById('ideas-content');
            let html = "";
            const allIdeas = [...baseIdeas, ...customIdeas];
            
            allIdeas.forEach(idea => {
                const ingsJson = JSON.stringify(idea.ingredients);
                html += `
                <div class="glass-card p-5 idea-row border border-white hover:border-sky-200" 
                     onclick="showNutri('${idea.title}', ${ingsJson})">
                    <h4 class="font-bold text-lg text-gray-800">${idea.title}</h4>
                    <p class="text-[10px] text-gray-400 mb-2">${idea.desc}</p>
                    <div class="flex flex-wrap gap-1">
                        ${idea.ingredients.map(ing => `<span class="bg-sky-50 text-sky-600 text-[10px] px-2 py-0.5 rounded-lg">#${ing}</span>`).join('')}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        db.ref('rom_sync').on('value', (s) => {
            const d = s.val(); if (d) { 
                tastings = d.tastings || []; 
                medical = d.medical || []; 
                customIdeas = d.customIdeas || [];
                renderHome(); renderRepo(); renderMed(); updateIdeas(); 
            }
            document.getElementById('status-badge').innerText = "● מסונכרן";
            document.getElementById('status-badge').className = "sync-badge bg-green-50 text-green-500";
        });

        function nav(s) { 
            document.querySelectorAll('main > section').forEach(sec => sec.classList.add('hidden')); 
            document.getElementById(`sec-${s}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(s !== 'home') document.getElementById(`nav-${s}`).classList.add('active');
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }

        function calculateCustomNutrition() {
            const input = document.getElementById('custom-mix-input').value;
            if(!input) return;
            let found = Object.keys(nutriDB).filter(key => input.includes(key));
            if(found.length === 0) found = [input];
            showNutri("מחשבון שילובים", found);
        }

        // פונקציות עזר נוספות (בית, מאגר וכו')
        function renderHome() {
            const carousel = document.getElementById('week-carousel'); carousel.innerHTML = '';
            const weekDays = tastings.filter(t => t.week === activeWeek);
            weekDays.forEach((item, index) => {
                carousel.innerHTML += `<div class="flex-shrink-0 w-32 h-44 glass-card border-2 border-white flex flex-col items-center justify-center"><span class="text-[10px] text-gray-400">יום ${index+1}</span><div class="text-4xl my-2">${item.emoji || "🥣"}</div><span class="text-xs font-bold">${item.food}</span></div>`;
            });
            const cur = tastings[activeIdx];
            if(cur) {
                document.getElementById('today-food-text').innerText = cur.food;
                document.getElementById('today-day-text').innerText = `יום ${cur.day} (שבוע ${activeWeek})`;
            }
        }
        function renderRepo() { /* מימוש דומה לקודם */ }
        function renderMed() { /* מימוש דומה לקודם */ }
    </script>
</body>
</html>
