<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rom 👶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; color: #334155; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { background: #1a1a1a; border-radius: 50px; margin: 20px; height: 75px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .nav-item { color: #94a3b8; transition: all 0.3s; }
        .nav-item.active { color: #7dd3fc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .sync-badge { font-size: 10px; position: absolute; top: 15px; left: 20px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .check-btn { width: 80px; height: 80px; border-radius: 50%; display: flex; items-center: center; justify-content: center; border: 4px solid white; transition: all 0.3s; box-shadow: 0 10px 20px rgba(56,189,248,0.3); }
    </style>
</head>
<body class="pb-32">

    <div id="status-badge" class="sync-badge bg-gray-100 text-gray-400">מתחבר...</div>

    <div class="p-8 text-center">
        <h1 class="text-5xl font-light tracking-widest text-gray-800" style="font-family: serif;">Rom</h1>
        <div class="h-1 w-8 bg-sky-200 mx-auto mt-4 rounded-full"></div>
    </div>

    <main class="px-6">
        <section id="sec-home" class="space-y-6">
            <div class="glass-card shadow-xl p-10 text-center border-white relative overflow-hidden">
                <h3 class="text-sky-400 font-bold text-xs uppercase tracking-widest mb-4 italic">מה אוכלים היום?</h3>
                <div id="today-food-text" class="text-5xl font-bold text-gray-800 mb-2 italic">טוען...</div>
                <div id="today-day-text" class="text-gray-400 text-sm mb-8 italic italic">טוען נתונים...</div>
                
                <div class="flex justify-center">
                    <button onclick="markDayDone()" id="main-check-btn" class="check-btn bg-sky-400 text-white text-3xl active:scale-90">
                        <i class="fas fa-check" id="check-icon"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-xl font-bold text-gray-800 italic">המסע של רום <span class="text-sky-300 text-sm cursor-pointer" onclick="openModalForEdit(activeWeek)"><i class="fas fa-edit mr-2"></i></span></h2>
                </div>
                <div id="week-carousel" class="flex space-x-4 space-x-reverse overflow-x-auto no-scrollbar pb-4 italic"></div>
            </div>
        </section>

        <section id="sec-repo" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 font-serif mr-2 text-right">מאגר שבועות</h2>
            <div id="repo-list" class="space-y-4"></div>
            <button onclick="openModalForNew()" class="w-full py-4 border-2 border-dashed border-sky-200 rounded-3xl text-sky-400 font-bold">+ הוספת שבוע חדש</button>
        </section>

        <section id="sec-med" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 mr-2 text-right">פנקס רפואי 🩺</h2>
            <div id="med-list" class="space-y-4"></div>
            <div class="glass-card p-6 shadow-lg space-y-3 text-right italic">
                <input id="med-name" type="text" placeholder="שם החיסון / בדיקה" class="w-full bg-transparent border-b p-2 focus:outline-none text-right">
                <div class="flex gap-2">
                    <input id="med-date" type="date" class="w-1/2 bg-transparent border-b p-2 text-sm">
                    <input id="med-time" type="time" class="w-1/2 bg-transparent border-b p-2 text-sm">
                </div>
                <button onclick="addMed()" class="w-full mt-2 bg-gray-800 text-white p-3 rounded-2xl font-bold text-sm">שמור אירוע</button>
            </div>
        </section>
    </main>

    <div id="week-modal" class="modal">
        <div class="glass-card w-full max-w-sm p-8 shadow-2xl space-y-4 text-center">
            <h3 id="modal-title" class="text-2xl font-bold text-gray-800">ניהול שבוע ✨</h3>
            <input id="modal-dates" type="text" placeholder="תאריכים (למשל 12.03-18.03)" class="w-full border rounded-2xl p-3 text-right text-sm">
            <input id="modal-emoji" type="text" placeholder="אימוג'י (🥕🍠)" class="w-full border rounded-2xl p-3 text-right text-sm">
            <textarea id="modal-foods" placeholder="ירקות (מופרדים בפסיקים)" class="w-full border rounded-2xl p-3 text-right text-sm h-24"></textarea>
            <div class="flex gap-2">
                <button onclick="saveWeek()" class="flex-1 bg-sky-400 text-white p-3 rounded-2xl font-bold text-sm">שמור</button>
                <button onclick="toggleModal(false)" class="flex-1 bg-gray-100 text-gray-500 p-3 rounded-2xl font-bold text-sm">ביטול</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center z-50">
        <div class="bottom-nav flex items-center justify-around w-full max-w-sm px-4">
            <button onclick="nav('repo')" id="nav-repo" class="nav-item flex flex-col items-center">
                <i class="fas fa-archive text-xl"></i><span class="text-[10px] mt-1 font-bold">מאגר</span>
            </button>
            <button onclick="nav('home')" id="nav-home" class="active -mt-10">
                <div class="w-16 h-16 bg-sky-400 rounded-full flex items-center justify-center border-4 border-[#1a1a1a] shadow-xl text-white"><i class="fas fa-heart text-xl"></i></div>
            </button>
            <button onclick="nav('med')" id="nav-med" class="nav-item flex flex-col items-center">
                <i class="fas fa-notes-medical text-xl"></i><span class="text-[10px] mt-1 font-bold">רפואי</span>
            </button>
        </div>
    </nav>

    <script>
        // אבטחת מפתח עבור GitHub
        const k1 = "AIzaSyCNJE1_9GV";
        const k2 = "z9P7W8wuDo5IZEGqbLv5cvzI";
        
        const firebaseConfig = {
            apiKey: k1 + k2,
            authDomain: "romtastings.firebaseapp.com",
            databaseURL: "https://romtastings-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "romtastings",
            storageBucket: "romtastings.firebasestorage.app",
            messagingSenderId: "27656464730",
            appId: "1:27656464730:web:1e53904d7f3d9149356b63"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tastings = [];
        let medical = [];
        let activeWeek = 1;
        let activeIdx = 0;
        let editingWeek = null;

        // סנכרון נתונים בזמן אמת
        db.ref('rom_sync').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                tastings = data.tastings || [];
                medical = data.medical || [];
                document.getElementById('status-badge').innerText = "● מסונכרן";
                document.getElementById('status-badge').className = "sync-badge bg-green-50 text-green-500";
                renderHome();
                renderRepo();
                renderMed();
            }
        });

        function uploadData() {
            db.ref('rom_sync').set({ tastings, medical });
        }

        function nav(s) {
            document.querySelectorAll('main > section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`sec-${s}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(s !== 'home') document.getElementById(`nav-${s}`).classList.add('active');
        }

        function renderHome() {
            const carousel = document.getElementById('week-carousel');
            carousel.innerHTML = '';
            const weekDays = tastings.filter(t => t.week === activeWeek);
            if(weekDays.length === 0) return;

            weekDays.forEach((item, index) => {
                const isSelected = tastings[activeIdx] && tastings[activeIdx].id === item.id;
                const displayEmoji = (index === 6) ? "🥗" : (item.emoji || "🥣");
                carousel.innerHTML += `
                    <div onclick="activeIdx=${tastings.indexOf(item)}; renderHome();" class="flex-shrink-0 w-32 h-44 glass-card border-2 flex flex-col items-center justify-center transition-all ${isSelected ? 'border-sky-300 bg-sky-50 scale-105' : 'border-white'} ${item.status === 'done' ? 'opacity-50' : ''}">
                        <span class="text-[10px] text-gray-400 font-bold mb-4 italic">יום ${index + 1}</span>
                        <div class="text-3xl mb-2">${displayEmoji}</div>
                        <span class="text-xs font-bold text-gray-700">${item.food}</span>
                        ${item.status === 'done' ? '<div class="mt-2 text-sky-400"><i class="fas fa-check-circle"></i></div>' : ''}
                    </div>`;
            });

            const current = tastings[activeIdx];
            if (current) {
                document.getElementById('today-food-text').innerText = current.food;
                document.getElementById('today-day-text').innerText = `יום ${current.day} למסע`;
                const btn = document.getElementById('main-check-btn');
                btn.style.backgroundColor = current.status === 'done' ? "#10b981" : "#38bdf8";
            }
        }

        function markDayDone() {
            if(!tastings[activeIdx]) return;
            tastings[activeIdx].status = (tastings[activeIdx].status === 'done' ? 'pending' : 'done');
            uploadData();
        }

        function toggleModal(show) { document.getElementById('week-modal').classList.toggle('active', show); }

        function openModalForNew() {
            editingWeek = null;
            document.getElementById('modal-title').innerText = "שבוע חדש ✨";
            document.getElementById('modal-foods').value = "בטטה, בטטה, בטטה, גזר, גזר, גזר, שילוב";
            toggleModal(true);
        }

        function openModalForEdit(w) {
            editingWeek = w;
            const items = tastings.filter(t => t.week === w);
            document.getElementById('modal-title').innerText = `עריכת שבוע ${w}`;
            document.getElementById('modal-dates').value = items[0].date || '';
            document.getElementById('modal-emoji').value = items[0].emoji || '';
            document.getElementById('modal-foods').value = items.map(i => i.food).join(', ');
            toggleModal(true);
        }

        function saveWeek() {
            const dates = document.getElementById('modal-dates').value;
            const emoji = document.getElementById('modal-emoji').value;
            const foods = document.getElementById('modal-foods').value;
            const foodArr = foods.split(',').map(s => s.trim());

            if (editingWeek) {
                let dayC = 0;
                tastings.forEach(t => { if(t.week === editingWeek) { t.date = dates; t.emoji = emoji; t.food = foodArr[dayC++] || foodArr[0]; } });
            } else {
                const nextW = tastings.length > 0 ? Math.max(...tastings.map(t => t.week)) + 1 : 1;
                const lastD = tastings.length > 0 ? Math.max(...tastings.map(t => t.day)) : 0;
                for(let i=0; i<7; i++) {
                    tastings.push({ 
                        id: Date.now() + i, 
                        week: nextW, 
                        day: lastD + 1 + i, 
                        food: foodArr[i] || foodArr[0], 
                        emoji: i === 6 ? "🥗" : emoji, 
                        status: 'pending', 
                        date: dates 
                    });
                }
                activeWeek = nextW;
                activeIdx = tastings.findIndex(t => t.week === activeWeek);
            }
            uploadData();
            toggleModal(false);
        }

        function renderRepo() {
            const container = document.getElementById('repo-list');
            container.innerHTML = '';
            const weeks = [...new Set(tastings.map(t => t.week))];
            weeks.forEach(w => {
                const items = tastings.filter(t => t.week === w);
                const done = items.every(t => t.status === 'done');
                container.innerHTML += `
                    <div class="glass-card p-6 border-r-8 ${done ? 'border-green-400' : 'border-sky-100'} shadow-sm flex justify-between items-center">
                        <div onclick="activeWeek=${w}; activeIdx=tastings.findIndex(t=>t.week==${w}); nav('home');">
                            <div class="text-xl font-bold italic">שבוע ${w} ${done ? '✅' : ''}</div>
                            <div class="text-[11px] text-gray-400 mt-1">${items[0].date || 'טרם נקבע תאריך'}</div>
                        </div>
                        <button onclick="openModalForEdit(${w})" class="text-gray-300 p-2"><i class="fas fa-edit"></i></button>
                    </div>`;
            });
        }

        function renderMed() {
            const list = document.getElementById('med-list');
            list.innerHTML = medical.map((m, i) => `
                <div class="glass-card p-5 border-r-8 border-sky-300 flex justify-between items-center shadow-sm italic">
                    <div><div class="font-bold text-gray-800">${m.name}</div><div class="text-[11px] text-gray-500">${m.date} | ${m.time}</div></div>
                    <button onclick="medical.splice(${i}, 1); uploadData();" class="text-gray-200"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('');
        }

        function addMed() {
            const name = document.getElementById('med-name').value;
            const date = document.getElementById('med-date').value;
            const time = document.getElementById('med-time').value;
            if(!name || !date) return;
            medical.push({ name, date, time });
            uploadData();
            document.getElementById('med-name').value = '';
        }
    </script>
</body>
</html>
