<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rom 👶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; color: #334155; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bottom-nav { background: #1a1a1a; border-radius: 50px; margin: 20px; height: 75px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .nav-item { color: #94a3b8; transition: all 0.3s; }
        .nav-item.active { color: #7dd3fc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-32">

    <div class="p-8 text-center">
        <h1 class="text-5xl font-light tracking-widest text-gray-800" style="font-family: serif;">Rom</h1>
        <div class="h-1 w-8 bg-sky-300 mx-auto mt-4 rounded-full"></div>
    </div>

    <main class="px-6">
        <section id="sec-home" class="space-y-6">
            <div class="glass-card shadow-xl p-8 text-center border-white relative">
                <h3 class="text-sky-400 font-bold text-xs uppercase tracking-widest mb-2 italic">מה אוכלים היום?</h3>
                <div id="today-food-text" class="text-4xl font-bold text-gray-800 mb-1 italic">בחר יום...</div>
                <div id="today-day-text" class="text-gray-400 text-sm mb-6 italic">לחץ על אחד הימים למטה</div>
                <button onclick="markDayDone()" id="main-check-icon" class="bg-sky-400 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center mx-auto text-3xl border-4 border-white transition-all active:scale-90">✅</button>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-lg font-bold text-gray-800 italic">שבוע <span id="current-week-num">1</span></h2>
                    <div id="next-week-btn-container"></div>
                </div>
                <div id="week-carousel" class="flex space-x-4 space-x-reverse overflow-x-auto no-scrollbar pb-4 italic"></div>
            </div>
        </section>

        <section id="sec-repo" class="hidden space-y-6">
            <div class="flex justify-between items-center mr-2">
                <h2 class="text-2xl font-bold text-gray-800 font-serif">מאגר שבועות</h2>
                <button onclick="openModalForNew()" class="bg-sky-400 text-white px-4 py-2 rounded-full text-xs font-bold shadow-md">+ שבוע חדש</button>
            </div>
            <div id="repo-list" class="space-y-4"></div>
        </section>

        <section id="sec-med" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 mr-2 text-right">פנקס רפואי 🩺</h2>
            <div id="med-list" class="space-y-4"></div>
            <div class="glass-card p-6 shadow-lg space-y-3 border-sky-50 text-right italic">
                <input id="med-name" type="text" placeholder="שם החיסון / בדיקה" class="w-full bg-transparent border-b p-2 focus:outline-none text-right">
                <div class="flex gap-2">
                    <input id="med-date" type="date" class="w-1/2 bg-transparent border-b p-2 text-sm">
                    <input id="med-time" type="time" class="w-1/2 bg-transparent border-b p-2 text-sm">
                </div>
                <button onclick="addMed()" class="w-full mt-2 bg-gray-800 text-white p-3 rounded-2xl font-bold text-sm">שמור אירוע</button>
            </div>
        </section>
    </main>

    <div id="week-modal" class="modal">
        <div class="glass-card w-full max-w-sm p-8 shadow-2xl space-y-4 text-center">
            <h3 id="modal-title" class="text-2xl font-bold text-gray-800">ניהול שבוע טעימות</h3>
            <div class="space-y-3">
                <input id="modal-dates" type="text" placeholder="תאריכי השבוע (למשל 12.03 - 18.03)" class="w-full bg-white/50 border rounded-2xl p-3 text-right text-sm">
                <input id="modal-emoji" type="text" placeholder="אימוג'ים לשבוע (למשל 🥕🍠)" class="w-full bg-white/50 border rounded-2xl p-3 text-right text-sm">
                <textarea id="modal-foods" placeholder="שמות המאכלים (הפרידו בפסיקים עבור 7 ימים)" class="w-full bg-white/50 border rounded-2xl p-3 text-right text-sm h-24" rows="3"></textarea>
            </div>
            <div class="flex gap-2">
                <button onclick="saveWeek()" class="flex-1 bg-sky-400 text-white p-3 rounded-2xl font-bold text-sm">שמור שינויים</button>
                <button onclick="toggleModal(false)" class="flex-1 bg-gray-100 text-gray-500 p-3 rounded-2xl font-bold text-sm">ביטול</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center z-50">
        <div class="bottom-nav flex items-center justify-around w-full max-w-sm px-4">
            <button onclick="nav('repo')" id="nav-repo" class="nav-item flex flex-col items-center">
                <i class="fas fa-archive text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">מאגר</span>
            </button>
            <button onclick="nav('home')" id="nav-home" class="active -mt-10 transition-all">
                <div class="w-16 h-16 bg-sky-400 rounded-full flex items-center justify-center border-4 border-[#1a1a1a] shadow-xl text-white">
                    <i class="fas fa-heart text-xl"></i>
                </div>
            </button>
            <button onclick="nav('med')" id="nav-med" class="nav-item flex flex-col items-center">
                <i class="fas fa-notes-medical text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">רפואי</span>
            </button>
        </div>
    </nav>

    <script>
        let tastings = JSON.parse(localStorage.getItem('rom_v6_tastings')) || [
            { id: 1, week: 1, day: 1, food: "קישוא", emoji: "🥒", status: 'pending', date: 'לא הוגדר' },
            { id: 2, week: 1, day: 2, food: "קישוא", emoji: "🥒", status: 'pending', date: 'לא הוגדר' },
            { id: 3, week: 1, day: 3, food: "קישוא", emoji: "🥒", status: 'pending', date: 'לא הוגדר' },
            { id: 4, week: 1, day: 4, food: "גזר", emoji: "🥕", status: 'pending', date: 'לא הוגדר' },
            { id: 5, week: 1, day: 5, food: "גזר", emoji: "🥕", status: 'pending', date: 'לא הוגדר' },
            { id: 6, week: 1, day: 6, food: "גזר", emoji: "🥕", status: 'pending', date: 'לא הוגדר' },
            { id: 7, week: 1, day: 7, food: "שילוב חגיגי", emoji: "🥗", status: 'pending', date: 'לא הוגדר' }
        ];

        let medical = JSON.parse(localStorage.getItem('rom_v6_medical')) || [];
        let activeWeek = 1;
        let activeIdx = 0;
        let editingWeek = null;

        function nav(s) {
            document.querySelectorAll('main > section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`sec-${s}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(s !== 'home') document.getElementById(`nav-${s}`).classList.add('active');
            if(s === 'repo') renderRepo();
            if(s === 'home') renderHome();
        }

        function renderHome() {
            const carousel = document.getElementById('week-carousel');
            carousel.innerHTML = '';
            document.getElementById('current-week-num').innerText = activeWeek;
            
            const weekDays = tastings.filter(t => t.week === activeWeek);
            const allDone = weekDays.length > 0 && weekDays.every(t => t.status === 'done');

            weekDays.forEach((item, index) => {
                const isDone = item.status === 'done';
                const isSelected = tastings[activeIdx] && tastings[activeIdx].id === item.id;
                // ביום השביעי של השבוע (אינדקס 6), נציג אימוג'י של סלט/שילוב
                const displayEmoji = (index === 6) ? "🥗" : (item.emoji || "🥣");

                carousel.innerHTML += `
                    <div onclick="selectDay(${tastings.indexOf(item)})" class="flex-shrink-0 w-28 h-36 glass-card border-2 flex flex-col items-center justify-center transition-all ${isSelected ? 'border-sky-300 bg-sky-50 scale-105' : 'border-white'} ${isDone ? 'opacity-60 bg-green-50' : ''}">
                        <span class="text-[10px] text-gray-400 font-bold uppercase italic">יום ${item.day}</span>
                        <div class="text-2xl my-2">${displayEmoji}</div>
                        <span class="text-[11px] font-bold text-gray-700">${item.food}</span>
                        ${isDone ? '<i class="fas fa-check-circle text-green-500 mt-1"></i>' : ''}
                    </div>
                `;
            });

            const current = tastings[activeIdx];
            if (current) {
                // בדיקה אם זה היום השביעי בתוך השבוע שלו
                const weekItems = tastings.filter(t => t.week === current.week);
                const isSeventhDay = weekItems.indexOf(current) === 6;
                const displayEmoji = isSeventhDay ? "🥗" : (current.emoji || "");
                
                document.getElementById('today-food-text').innerText = current.food + " " + displayEmoji;
                document.getElementById('today-day-text').innerText = `יום ${current.day} למסע`;
            }

            const btn = document.getElementById('main-check-icon');
            btn.className = (current && current.status === 'done') ? "bg-green-500 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center mx-auto text-3xl border-4 border-white opacity-80" : "bg-sky-400 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center mx-auto text-3xl border-4 border-white";

            const nextBtnContainer = document.getElementById('next-week-btn-container');
            if(allDone) {
                nextBtnContainer.innerHTML = `<button onclick="openModalForNew()" class="bg-sky-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg animate-bounce">שבוע הבא ➔</button>`;
            } else {
                nextBtnContainer.innerHTML = '';
            }
        }

        function selectDay(idx) { activeIdx = idx; renderHome(); }

        function markDayDone() { 
            if(!tastings[activeIdx]) return;
            tastings[activeIdx].status = tastings[activeIdx].status === 'done' ? 'pending' : 'done';
            localStorage.setItem('rom_v6_tastings', JSON.stringify(tastings));
            
            if (tastings[activeIdx].status === 'done') {
                const weekItems = tastings.filter(t => t.week === activeWeek);
                const currentWeekIdx = weekItems.indexOf(tastings[activeIdx]);
                if (currentWeekIdx < weekItems.length - 1) {
                    setTimeout(() => {
                        activeIdx = tastings.indexOf(weekItems[currentWeekIdx + 1]);
                        renderHome();
                    }, 300);
                }
            }
            renderHome();
        }

        function toggleModal(show) { document.getElementById('week-modal').classList.toggle('active', show); }

        function openModalForNew() {
            editingWeek = null;
            document.getElementById('modal-title').innerText = "התחלת שבוע חדש ✨";
            document.getElementById('modal-dates').value = "";
            document.getElementById('modal-emoji').value = "";
            document.getElementById('modal-foods').value = "גזר, גזר, גזר, בטטה, בטטה, בטטה, שילוב";
            toggleModal(true);
        }

        function openModalForEdit(w) {
            editingWeek = w;
            const weekItems = tastings.filter(t => t.week === w);
            document.getElementById('modal-title').innerText = `עריכת שבוע ${w} ✏️`;
            document.getElementById('modal-dates').value = weekItems[0].date;
            document.getElementById('modal-emoji').value = weekItems[0].emoji;
            document.getElementById('modal-foods').value = weekItems.map(i => i.food).join(', ');
            toggleModal(true);
        }

        function saveWeek() {
            const dates = document.getElementById('modal-dates').value;
            const emoji = document.getElementById('modal-emoji').value;
            const foods = document.getElementById('modal-foods').value;
            if(!dates || !foods) return;

            const foodArr = foods.split(',').map(s => s.trim());

            if (editingWeek) {
                let dayCounter = 0;
                tastings.forEach(t => {
                    if (t.week === editingWeek) {
                        t.date = dates;
                        t.emoji = emoji;
                        t.food = foodArr[dayCounter] || foodArr[0];
                        dayCounter++;
                    }
                });
            } else {
                const nextW = Math.max(...tastings.map(t => t.week)) + 1;
                const lastDay = Math.max(...tastings.map(t => t.day));
                for(let i=0; i<7; i++) {
                    tastings.push({
                        id: Date.now() + i,
                        week: nextW,
                        day: lastDay + 1 + i,
                        food: foodArr[i] || foodArr[0],
                        emoji: emoji,
                        status: 'pending',
                        date: dates
                    });
                }
                activeWeek = nextW;
                activeIdx = tastings.findIndex(t => t.week === activeWeek);
            }

            localStorage.setItem('rom_v6_tastings', JSON.stringify(tastings));
            toggleModal(false);
            renderHome();
            renderRepo();
        }

        function renderRepo() {
            const container = document.getElementById('repo-list');
            container.innerHTML = '';
            const weeks = [...new Set(tastings.map(t => t.week))];
            weeks.forEach(w => {
                const weekItems = tastings.filter(t => t.week === w);
                const allDone = weekItems.every(t => t.status === 'done');
                container.innerHTML += `
                    <div class="glass-card p-6 border-r-8 ${allDone ? 'border-green-400' : 'border-sky-200'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="text-lg font-bold italic">שבוע ${w} ${allDone ? '✅' : ''}</div>
                                <div class="text-[11px] text-gray-400 font-bold">${weekItems[0].date}</div>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="openModalForEdit(${w})" class="text-gray-400 text-sm"><i class="fas fa-edit"></i></button>
                                <button onclick="activeWeek=${w}; activeIdx=tastings.findIndex(t=>t.week==${w}); nav('home');" class="text-sky-400 text-xs font-bold">צפייה ➔</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderMed() {
            const list = document.getElementById('med-list');
            list.innerHTML = medical.map((m, i) => `
                <div class="glass-card p-5 shadow-sm border-r-8 border-sky-300 flex justify-between items-center text-right italic">
                    <div><div class="font-bold text-gray-800">${m.name}</div><div class="text-[11px] text-gray-500 mt-1">${m.date} | ${m.time}</div></div>
                    <button onclick="delMed(${i})" class="text-gray-300"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function addMed() {
            const name = document.getElementById('med-name').value;
            const date = document.getElementById('med-date').value;
            const time = document.getElementById('med-time').value;
            if(!name || !date) return;
            medical.push({ name, date, time });
            localStorage.setItem('rom_v6_medical', JSON.stringify(medical));
            renderMed();
            document.getElementById('med-name').value = '';
        }

        function delMed(i) { medical.splice(i, 1); localStorage.setItem('rom_v6_medical', JSON.stringify(medical)); renderMed(); }

        renderHome(); renderMed();
    </script>
</body>
</html>
