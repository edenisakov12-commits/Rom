<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האפליקציה של רום 👶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        .tab-active { color: #db2777; border-top: 3px solid #db2777; }
        .done-item { opacity: 0.6; text-decoration: line-through; border-color: #10b981 !important; }
    </style>
</head>
<body class="bg-pink-50 min-h-screen">

    <header class="bg-white p-6 rounded-b-[40px] shadow-md text-center">
        <h1 class="text-3xl font-bold text-pink-600">רום הקטן שלנו 👶</h1>
        <p class="text-gray-500 font-medium mt-1">מעקב טעימות ורפואה</p>
    </header>

    <main class="p-4 pb-24" id="main-content">
        <section id="tasting-section">
            <h2 class="text-xl font-bold text-gray-800 mb-4 mr-2">טבלת טעימות - חודש 1</h2>
            <div id="tasting-list" class="space-y-3">
                </div>
        </section>

        <section id="medical-section" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4 mr-2">מעקב רפואי וחיסונים 💉</h2>
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <input id="med-input" type="text" placeholder="שם החיסון / בדיקה..." class="w-full p-3 border rounded-xl mb-2 text-right">
                <button onclick="addMedical()" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold">הוסף לרשימה +</button>
            </div>
            <div id="medical-list" class="space-y-3">
                </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-lg">
        <button onclick="showTab('tasting')" id="btn-tasting" class="flex flex-col items-center tab-active transition-all">
            <i class="fas fa-utensils text-xl"></i>
            <span class="text-xs mt-1 font-bold">טעימות</span>
        </button>
        <button onclick="showTab('medical')" id="btn-medical" class="flex flex-col items-center text-gray-400 transition-all">
            <i class="fas fa-stethoscopes text-xl"></i>
            <span class="text-xs mt-1 font-bold">רפואי</span>
        </button>
    </nav>

    <script>
        // נתונים ראשוניים של הטעימות
        const initialTastings = [
            { id: 1, food: "קישוא 🥒", days: "ימים 1-3", week: 1 },
            { id: 2, food: "גזר 🥕", days: "ימים 4-6", week: 1 },
            { id: 3, food: "קישוא + גזר 🥗", days: "יום 7", week: 1 },
            { id: 4, food: "בטטה 🍠", days: "ימים 8-10", week: 2 },
            { id: 5, food: "תפוח אדמה 🥔", days: "ימים 11-13", week: 2 },
            { id: 6, food: "מרק כתום 🥣", days: "יום 14", week: 2 },
            { id: 7, food: "תפוח עץ 🍎", days: "ימים 15-17", week: 3 },
            { id: 8, food: "אגס 🍐", days: "ימים 18-20", week: 3 },
            { id: 9, food: "בננה 🍌", days: "יום 21", week: 3 },
            { id: 10, food: "דלעת 🎃", days: "ימים 22-24", week: 4 },
            { id: 11, food: "עוף/הודו 🍗", days: "ימים 25-27", week: 4 },
            { id: 12, food: "ארוחה שלמה 🍽️", days: "ימים 28-30", week: 4 }
        ];

        let doneTastings = JSON.parse(localStorage.getItem('doneTastings')) || [];
        let medicalRecords = JSON.parse(localStorage.getItem('medicalRecords')) || [];

        function renderTastings() {
            const list = document.getElementById('tasting-list');
            list.innerHTML = '';
            initialTastings.forEach(item => {
                const isDone = doneTastings.includes(item.id);
                list.innerHTML += `
                    <div onclick="toggleTasting(${item.id})" class="bg-white p-4 rounded-2xl shadow-sm border-2 flex justify-between items-center transition-all ${isDone ? 'done-item' : 'border-transparent'}">
                        <div>
                            <div class="font-bold text-gray-800 text-lg">${item.food}</div>
                            <div class="text-sm text-gray-500 italic uppercase">שבוע ${item.week} | ${item.days}</div>
                        </div>
                        <i class="fas ${isDone ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-200'} text-2xl"></i>
                    </div>
                `;
            });
        }

        function toggleTasting(id) {
            if (doneTastings.includes(id)) {
                doneTastings = doneTastings.filter(i => i !== id);
            } else {
                doneTastings.push(id);
            }
            localStorage.setItem('doneTastings', JSON.stringify(doneTastings));
            renderTastings();
        }

        function renderMedical() {
            const list = document.getElementById('medical-list');
            list.innerHTML = '';
            medicalRecords.forEach((record, index) => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-r-4 border-blue-400">
                        <span class="font-medium text-gray-700">${record}</span>
                        <button onclick="deleteMedical(${index})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function addMedical() {
            const input = document.getElementById('med-input');
            if (input.value.trim() === '') return;
            medicalRecords.push(input.value);
            localStorage.setItem('medicalRecords', JSON.stringify(medicalRecords));
            input.value = '';
            renderMedical();
        }

        function deleteMedical(index) {
            medicalRecords.splice(index, 1);
            localStorage.setItem('medicalRecords', JSON.stringify(medicalRecords));
            renderMedical();
        }

        function showTab(tab) {
            document.getElementById('tasting-section').classList.toggle('hidden', tab !== 'tasting');
            document.getElementById('medical-section').classList.toggle('hidden', tab !== 'medical');
            document.getElementById('btn-tasting').classList.toggle('tab-active', tab === 'tasting');
            document.getElementById('btn-medical').classList.toggle('tab-active', tab === 'medical');
        }

        // הפעלה ראשונית
        renderTastings();
        renderMedical();
    </script>
</body>
</html>
